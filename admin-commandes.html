<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Commandes — Admin Jumua Time</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { teal:'#5B9EAD','teal-dark':'#3D7A8A',gold:'#C49A5A',bg:'#FAF6F0',border:'#E2D4BC',muted:'#8B7A5A' }, fontFamily: { display:['Playfair Display','serif'], body:['DM Sans','sans-serif'] } } }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #F0EBE4; color: #1A1208; margin: 0; min-height: 100vh; }
  .ms { font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-smoothing:antialiased; }
  .btn-teal { background:#5B9EAD;color:white;border:none;border-radius:12px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:background 0.2s;display:inline-flex;align-items:center;gap:5px; }
  .btn-teal:hover { background:#3D7A8A; }
  .btn-teal:disabled { opacity:0.5;cursor:not-allowed; }
  .btn-sm { padding:5px 12px;font-size:12px;border-radius:8px; }
  .status-badge { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
  .status-pending    { background:#FFF0E0;color:#C07830; }
  .status-confirmed  { background:#E0F0FF;color:#2A70C0; }
  .status-fabrication{ background:#F0E8F8;color:#7030A0; }
  .status-shipped    { background:#E0F8E8;color:#207040; }
  .status-delivered  { background:#EFEFEF;color:#707070; }
  .filter-pill { padding:6px 14px;border-radius:20px;border:1.5px solid #E2D4BC;background:white;font-size:12px;font-weight:500;color:#8B7A5A;cursor:pointer;transition:all 0.15s; }
  .filter-pill.active { background:#5B9EAD;color:white;border-color:#5B9EAD; }
  .order-card { background:white;border:1px solid #E2D4BC;border-radius:16px;overflow:hidden;transition:box-shadow 0.2s; }
  .order-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.07); }
  .order-card-header { padding:14px 16px;border-bottom:1px solid #F0EBE4;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px; }
  .order-card-body { padding:14px 16px; }
  .order-card-footer { padding:12px 16px;border-top:1px solid #F0EBE4;background:#FAFAF8;display:flex;align-items:center;gap-8px;flex-wrap:wrap;gap:8px; }
  .info-row { display:flex;gap:8px;font-size:13px;margin-bottom:6px; }
  .info-label { color:#8B7A5A;min-width:110px;flex-shrink:0; }
  .skeleton { background:linear-gradient(90deg,#E2D4BC 25%,#F5EDE0 50%,#E2D4BC 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;height:16px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  #toast { position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1208;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap; }
  #toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
  #toast.error { background:#C0392B; }
  #toast.success { background:#207040; }
  .field-input { border:1.5px solid #E2D4BC;border-radius:10px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1A1208;background:white;outline:none;width:100%; }
  .field-input:focus { border-color:#5B9EAD; }
</style>
</head>
<body class="bg-bg font-body">

<!-- ═══ SIDEBAR + LAYOUT ═══ -->
<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="hidden md:flex flex-col w-52 flex-shrink-0 py-6 px-4 border-r border-border bg-white">
    <a href="index.html" class="no-underline mb-8">
      <img src="Images/logo_jumuatime.svg" alt="Jumua Time" class="h-8 w-auto object-contain">
    </a>
    <nav class="flex flex-col gap-1 flex-1">
      <a href="admin.html" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium no-underline text-muted hover:bg-gray-50 transition-colors">
        <span class="ms" style="font-size:18px;">dashboard</span> Dashboard
      </a>
      <a href="admin-livres.html" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium no-underline text-muted hover:bg-gray-50 transition-colors">
        <span class="ms" style="font-size:18px;">menu_book</span> Livres
      </a>
      <a href="admin-soumissions.html" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium no-underline text-muted hover:bg-gray-50 transition-colors">
        <span class="ms" style="font-size:18px;">inbox</span> Soumissions
      </a>
      <a href="admin-ressources.html" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium no-underline text-muted hover:bg-gray-50 transition-colors">
        <span class="ms" style="font-size:18px;">sell</span> Ressources
      </a>
      <a href="admin-commandes.html" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-semibold no-underline rounded-xl" style="background:#EBF5F7;color:#3D7A8A;">
        <span class="ms" style="font-size:18px;font-variation-settings:'FILL' 1;">local_shipping</span> Commandes
      </a>
      <a href="admin-avis.html" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium no-underline text-muted hover:bg-gray-50 transition-colors">
        <span class="ms" style="font-size:18px;">rate_review</span> Avis
      </a>
      <a href="admin-utilisateurs.html" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium no-underline text-muted hover:bg-gray-50 transition-colors">
        <span class="ms" style="font-size:18px;">group</span> Utilisateurs
      </a>
    </nav>
    <button onclick="signOut()" class="flex items-center gap-2 px-3 py-2.5 text-sm font-medium text-muted hover:text-red-600 transition-colors cursor-pointer border-none bg-transparent">
      <span class="ms" style="font-size:18px;">logout</span> Déconnexion
    </button>
  </aside>

  <!-- Main -->
  <div class="flex-1 p-4 md:p-8 max-w-full overflow-x-hidden">

    <!-- Header page -->
    <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
      <div>
        <h1 class="font-display text-xl md:text-2xl font-bold" style="color:#1A1208;">Commandes</h1>
        <p class="text-sm text-muted mt-0.5">Gestion des commandes personnalisées</p>
      </div>
      <div class="flex items-center gap-2">
        <span id="orders-count" class="text-sm text-muted"></span>
        <button class="btn-teal btn-sm" onclick="loadOrders()">
          <span class="ms" style="font-size:16px;">refresh</span> Actualiser
        </button>
      </div>
    </div>

    <!-- Filtres statut -->
    <div class="flex flex-wrap gap-2 mb-6">
      <button class="filter-pill active" data-status="all" onclick="setFilter(this)">Toutes</button>
      <button class="filter-pill" data-status="pending" onclick="setFilter(this)">
        <span style="color:#C07830;">●</span> En attente
      </button>
      <button class="filter-pill" data-status="confirmed" onclick="setFilter(this)">
        <span style="color:#2A70C0;">●</span> Payée — À fabriquer
      </button>
      <button class="filter-pill" data-status="fabrication" onclick="setFilter(this)">
        <span style="color:#7030A0;">●</span> En fabrication
      </button>
      <button class="filter-pill" data-status="shipped" onclick="setFilter(this)">
        <span style="color:#207040;">●</span> Expédiée
      </button>
      <button class="filter-pill" data-status="delivered" onclick="setFilter(this)">
        <span style="color:#707070;">●</span> Livrée
      </button>
    </div>

    <!-- Liste commandes -->
    <div id="orders-list" class="flex flex-col gap-4">
      <!-- Skeletons -->
      <div class="order-card">
        <div class="order-card-header"><div class="skeleton w-40"></div><div class="skeleton w-24"></div></div>
        <div class="order-card-body"><div class="space-y-2"><div class="skeleton w-3/4"></div><div class="skeleton w-1/2"></div><div class="skeleton w-2/3"></div></div></div>
      </div>
      <div class="order-card">
        <div class="order-card-header"><div class="skeleton w-40"></div><div class="skeleton w-24"></div></div>
        <div class="order-card-body"><div class="space-y-2"><div class="skeleton w-3/4"></div><div class="skeleton w-1/2"></div></div></div>
      </div>
    </div>

    <div id="orders-empty" class="hidden text-center py-16 text-muted">
      <span class="ms" style="font-size:40px;display:block;margin-bottom:12px;color:#E2D4BC;">local_shipping</span>
      Aucune commande pour ce filtre.
    </div>

  </div>
</div>

<div id="toast" role="alert" aria-live="polite"></div>

<script>
const STATUS_LABELS = {
  pending:     { label:'En attente de paiement', cls:'status-pending',     next:'confirmed'  },
  confirmed:   { label:'Payée — À fabriquer',    cls:'status-confirmed',   next:'fabrication'},
  fabrication: { label:'En cours de fabrication',cls:'status-fabrication', next:'shipped'    },
  shipped:     { label:'Expédiée',               cls:'status-shipped',     next:'delivered'  },
  delivered:   { label:'Livrée',                 cls:'status-delivered',   next:null         },
};

const STATUS_NEXT_LABEL = {
  confirmed:   'Marquer : En fabrication',
  fabrication: 'Marquer : Expédiée',
  shipped:     'Marquer : Livrée',
  delivered:   null,
};

let currentFilter = 'all';
let allOrders = [];

// ── Guard admin ──
(async () => {
  const ok = await isAdmin();
  if (!ok) { window.location.href = 'login.html'; }
  else { await loadOrders(); }
})();

async function loadOrders() {
  try {
    let query = _supabase
      .from('orders')
      .select('*')
      .order('created_at', { ascending: false });

    const { data, error } = await query;
    if (error) throw error;
    allOrders = data || [];
    renderOrders();
    document.getElementById('orders-count').textContent = `${allOrders.length} commande${allOrders.length !== 1 ? 's' : ''}`;
  } catch (err) {
    showToast('Erreur chargement : ' + err.message, 'error');
  }
}

function setFilter(btn) {
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.status;
  renderOrders();
}

function renderOrders() {
  const filtered = currentFilter === 'all'
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  const list  = document.getElementById('orders-list');
  const empty = document.getElementById('orders-empty');

  if (!filtered.length) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  list.innerHTML = filtered.map(order => {
    const st = STATUS_LABELS[order.status] || STATUS_LABELS.pending;
    const date = (() => {
      const d = new Date(order.created_at);
      return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    })();

    const nextBtn = st.next
      ? `<button class="btn-teal btn-sm" onclick="updateStatus('${order.id}','${st.next}')">${STATUS_NEXT_LABEL[order.status] || 'Avancer →'}</button>`
      : '';

    const shippedBtn = order.status === 'fabrication'
      ? `<button class="btn-teal btn-sm" style="background:#207040;" onclick="markShipped('${order.id}')"><span class="ms" style="font-size:14px;">local_shipping</span> Marquer comme expédiée</button>`
      : '';

    const trackingField = (order.status === 'shipped' || order.status === 'delivered')
      ? `<div class="flex items-center gap-2 mt-2">
           <span class="text-xs text-muted">Suivi :</span>
           <input id="tracking-${order.id}" type="text" class="field-input" style="max-width:180px;font-size:12px;" value="${order.tracking_number || ''}" placeholder="Numéro de suivi">
           <button class="btn-teal btn-sm" onclick="saveTracking('${order.id}')">Enregistrer</button>
         </div>`
      : '';

    return `
      <div class="order-card" id="order-${order.id}">
        <div class="order-card-header">
          <div class="flex items-center gap-3 flex-wrap">
            <span class="text-sm font-semibold">${order.product_name || '—'}</span>
            <span class="text-xs text-muted">× ${order.quantity || 1}</span>
            ${order.amount ? `<span class="text-sm font-bold" style="color:#5B9EAD;">${(order.amount/100).toFixed(2)} €</span>` : ''}
          </div>
          <span class="status-badge ${st.cls}">${st.label}</span>
        </div>
        <div class="order-card-body">
          <div class="info-row"><span class="info-label">Personnalisation</span><span>${order.customization || '—'}</span></div>
          <div class="info-row"><span class="info-label">Client</span><span>${order.nom_client || '—'}</span></div>
          <div class="info-row"><span class="info-label">Email</span><span>${order.email_client || '—'}</span></div>
          <div class="info-row"><span class="info-label">Adresse</span><span>${order.adresse || '—'}</span></div>
          ${order.message ? `<div class="info-row"><span class="info-label">Message</span><span style="font-style:italic;">"${order.message}"</span></div>` : ''}
          <div class="info-row"><span class="info-label">Date</span><span>${date}</span></div>
          ${trackingField}
        </div>
        <div class="order-card-footer">
          ${shippedBtn || nextBtn}
          ${order.status !== 'fabrication' && st.next ? '' : ''}
        </div>
      </div>
    `;
  }).join('');
}

async function updateStatus(id, newStatus) {
  try {
    const { error } = await _supabase
      .from('orders')
      .update({ status: newStatus })
      .eq('id', id);
    if (error) throw error;
    const order = allOrders.find(o => o.id === id);
    if (order) order.status = newStatus;
    renderOrders();
    showToast('Statut mis à jour.', 'success');
  } catch (err) {
    showToast('Erreur : ' + err.message, 'error');
  }
}

async function markShipped(id) {
  const trackingInput = document.getElementById('tracking-' + id);
  const tracking = trackingInput ? trackingInput.value.trim() : '';

  try {
    const { error } = await _supabase
      .from('orders')
      .update({
        status: 'shipped',
        tracking_number: tracking || null,
        shipped_at: new Date().toISOString(),
      })
      .eq('id', id);
    if (error) throw error;

    const order = allOrders.find(o => o.id === id);
    if (order) { order.status = 'shipped'; order.tracking_number = tracking || null; }
    renderOrders();
    showToast('Commande marquée comme expédiée.', 'success');

    // Déclenche l'email d'expédition via Edge Function
    await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ type: 'order_shipped', order_id: id, tracking_number: tracking }),
    }).catch(() => {}); // email optionnel — ne bloque pas si erreur

  } catch (err) {
    showToast('Erreur : ' + err.message, 'error');
  }
}

async function saveTracking(id) {
  const input = document.getElementById('tracking-' + id);
  if (!input) return;
  try {
    const { error } = await _supabase
      .from('orders')
      .update({ tracking_number: input.value.trim() || null })
      .eq('id', id);
    if (error) throw error;
    const order = allOrders.find(o => o.id === id);
    if (order) order.tracking_number = input.value.trim() || null;
    showToast('Numéro de suivi enregistré.', 'success');
  } catch (err) {
    showToast('Erreur : ' + err.message, 'error');
  }
}

async function signOut() {
  await _supabase.auth.signOut();
  window.location.href = 'login.html';
}

let toastTimer;
function showToast(msg, type = 'default') {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = type === 'error' ? 'show error' : type === 'success' ? 'show success' : 'show';
  toastTimer = setTimeout(() => { t.className = ''; }, 3500);
}
</script>

</body>
</html>
