<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chargement — Jumua Time</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="theme-color" content="#C96B8A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #FFF5F7;
    color: #3D1F2D;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.2;
    pointer-events: none;
  }
  .spinner-ring {
    width: 48px; height: 48px;
    border: 3px solid #E8D5DC;
    border-top-color: #C96B8A;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .card {
    animation: fadeIn 0.4s ease both;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  @media (prefers-reduced-motion: reduce) {
    .fade-up { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
<body>

<div class="blob w-64 h-64" style="background:#C96B8A;top:-40px;right:-40px;width:260px;height:260px;"></div>
<div class="blob" style="background:#9B7FA6;bottom:-40px;left:-40px;width:200px;height:200px;"></div>

<div class="card">
  <div class="w-14 h-14 rounded-2xl mx-auto mb-5 flex items-center justify-center" style="background:linear-gradient(135deg,#C96B8A,#9B7FA6);">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="spinner-ring mx-auto mb-4"></div>
  <p style="font-size:14px;color:#7A5A6A;" id="status-msg">Vérification de votre session…</p>
</div>

<script>
async function checkAndRedirect() {
  const next = new URLSearchParams(window.location.search).get('next') || 'compte.html';

  try {
    // Laisser Supabase traiter les tokens éventuels dans le hash URL
    await new Promise(r => setTimeout(r, 500));

    const { data: { session } } = await _supabase.auth.getSession();

    if (session) {
      document.getElementById('status-msg').textContent = 'Connexion réussie, redirection…';
      setTimeout(() => { window.location.href = next; }, 300);
    } else {
      document.getElementById('status-msg').textContent = 'Session expirée, redirection…';
      setTimeout(() => { window.location.href = 'login.html'; }, 800);
    }
  } catch (e) {
    document.getElementById('status-msg').textContent = 'Erreur de connexion…';
    setTimeout(() => { window.location.href = 'login.html'; }, 1200);
  }
}

checkAndRedirect();
</script>

</body>
</html>
