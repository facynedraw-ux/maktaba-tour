<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mon compte — Jumua Time</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="theme-color" content="#5B9EAD">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jumua Time">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        teal:        '#5B9EAD',
        'teal-light':'#EBF5F7',
        'teal-dark': '#3D7A8A',
        gold:        '#C49A5A',
        'gold-light':'#F5EDE0',
        'gold-dark': '#8B6230',
        dark:        '#1A1208',
        bg:          '#FAF6F0',
        border:      '#E2D4BC',
        text:        '#1A1208',
        muted:       '#8B7A5A',
      },
      fontFamily: {
        display: ['Playfair Display', 'serif'],
        body:    ['DM Sans', 'sans-serif'],
      },
    }
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family:'DM Sans',sans-serif; background:#FAF6F0; color:#1A1208; margin:0; }
  .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
  .ms { font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-smoothing:antialiased; }

  /* Buttons */
  .btn-teal { background:#5B9EAD;color:white;border:none;border-radius:20px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:background 0.2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none; }
  .btn-teal:hover { background:#3D7A8A; }
  .btn-ghost { background:transparent;color:#8B7A5A;border:1.5px solid #E2D4BC;border-radius:12px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px; }
  .btn-ghost:hover { border-color:#5B9EAD;color:#5B9EAD; }
  .btn-danger { background:#FEF0F0;color:#C03030;border:none;border-radius:12px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background 0.2s; }
  .btn-danger:hover { background:#FDDCDC; }

  /* Achat card */
  .achat-card { display:flex;gap:14px;background:white;border:1px solid #E2D4BC;border-radius:16px;padding:14px;transition:box-shadow 0.2s;align-items:center; }
  .achat-card:hover { box-shadow:0 4px 16px rgba(91,158,173,0.1); }
  .achat-cover { width:54px;height:70px;border-radius:10px;flex-shrink:0;overflow:hidden;background:#F5EDE0; }

  /* Skeleton */
  .skeleton { background:linear-gradient(90deg,#E2D4BC 25%,#F5EDE0 50%,#E2D4BC 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Field */
  .field-input { width:100%;padding:11px 14px;border:1.5px solid #E2D4BC;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:#1A1208;background:white;outline:none;transition:border-color 0.2s,box-shadow 0.2s; }
  .field-input:focus { border-color:#5B9EAD;box-shadow:0 0 0 3px rgba(91,158,173,0.1); }

  /* Footer nav */
  .footer-link { color:rgba(255,255,255,0.55);font-size:14px;text-decoration:none;transition:color 0.2s; }
  .footer-link:hover { color:white; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation:fadeUp 0.4s ease both; }
  .delay-1 { animation-delay:0.08s; }
  .delay-2 { animation-delay:0.16s; }

  @media (prefers-reduced-motion:reduce) {
    .fade-up { animation:none !important;opacity:1 !important; }
    .skeleton { animation:none !important; }
  }
</style>
</head>
<body class="bg-bg font-body text-text">

<!-- ═══════════════════════════════════
     HEADER
════════════════════════════════════ -->
<header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b border-border">
  <div class="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 no-underline">
      <img src="Images/logo_jumuatime.svg" alt="Jumua Time" class="h-8 w-auto object-contain">
      <span class="font-display font-bold text-lg hidden sm:block" style="color:#1A1208;">Jumua Time</span>
    </a>
    <button onclick="logout()" class="btn-danger">
      <span class="ms" style="font-size:16px;">logout</span>
      Déconnexion
    </button>
  </div>
</header>


<main class="max-w-2xl mx-auto px-4 pt-6 pb-28">

  <!-- ── PROFIL ── -->
  <div class="bg-white rounded-2xl border border-border p-5 mb-5 fade-up">
    <div class="flex items-center gap-4">
      <div id="avatar-circle"
           class="w-14 h-14 rounded-full flex-shrink-0 flex items-center justify-center text-xl font-bold font-display"
           style="background:linear-gradient(135deg,#EBF5F7,#F5EDE0);color:#5B9EAD;">…</div>
      <div class="flex-1 min-w-0">
        <div id="display-name" class="skeleton h-5 rounded w-32 mb-2"></div>
        <div id="user-email"   class="skeleton h-4 rounded w-48"></div>
      </div>
      <button onclick="toggleEditProfile()" class="w-9 h-9 rounded-xl border border-border flex items-center justify-center text-muted hover:text-teal hover:border-teal transition-colors" aria-label="Modifier le profil">
        <span class="ms" style="font-size:18px;">edit</span>
      </button>
    </div>

    <!-- Édition profil (caché par défaut) -->
    <div id="edit-form" class="hidden mt-4 pt-4 border-t border-border">
      <label for="input-name" class="block text-xs font-semibold text-muted mb-1 uppercase tracking-wide">Nom affiché</label>
      <input type="text" id="input-name" class="field-input mb-3" placeholder="Votre prénom ou pseudo">
      <div class="flex gap-2">
        <button onclick="saveProfile()" class="btn-teal text-sm" style="padding:8px 18px;border-radius:12px;">
          <span class="ms" style="font-size:15px;">check</span> Sauvegarder
        </button>
        <button onclick="toggleEditProfile()" class="btn-ghost text-sm">Annuler</button>
      </div>
    </div>
  </div>

  <!-- ── MES ACHATS ── -->
  <div class="fade-up delay-1">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-display font-bold text-lg" style="color:#1A1208;">
        Mes achats
        <span id="achats-count" class="font-body font-normal text-sm ml-1" style="color:#8B7A5A;"></span>
      </h2>
      <a href="ressources.html" class="text-sm font-medium no-underline" style="color:#5B9EAD;">Voir la boutique →</a>
    </div>

    <!-- Squelettes -->
    <div id="achats-skeleton" class="space-y-3">
      <div class="skeleton rounded-2xl" style="height:86px;"></div>
      <div class="skeleton rounded-2xl" style="height:86px;"></div>
    </div>

    <!-- Liste -->
    <div id="achats-list" class="space-y-3 hidden"></div>
  </div>

</main>


<!-- ═══════════════════════════════════
     BOTTOM NAV MOBILE (3 items)
════════════════════════════════════ -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-border md:hidden z-50"
     style="padding-bottom:max(0.75rem,env(safe-area-inset-bottom));"
     aria-label="Navigation mobile">
  <div class="grid grid-cols-3">
    <a href="index.html" class="flex flex-col items-center py-2.5 gap-0.5 no-underline" style="color:#8B7A5A;">
      <span class="ms" style="font-size:20px;">home</span>
      <span style="font-size:10px;">Accueil</span>
    </a>
    <a href="ressources.html" class="flex flex-col items-center py-2.5 gap-0.5 no-underline" style="color:#8B7A5A;">
      <span class="ms" style="font-size:20px;">store</span>
      <span style="font-size:10px;">Boutique</span>
    </a>
    <a href="compte.html" class="flex flex-col items-center py-2.5 gap-0.5 no-underline" style="color:#5B9EAD;">
      <span class="ms" style="font-size:20px;font-variation-settings:'FILL' 1;">person</span>
      <span style="font-size:10px;font-weight:600;">Compte</span>
    </a>
  </div>
</nav>


<script>
let session = null;
let editOpen = false;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
}

// ── Guard auth ──
async function init() {
  const { data: { session: s } } = await _supabase.auth.getSession();
  if (!s) { window.location.href = 'login.html'; return; }
  session = s;
  loadProfile();
  loadAchats();
}

// ── Profil ──
async function loadProfile() {
  const { data: profile } = await _supabase
    .from('profiles')
    .select('display_name, role')
    .eq('id', session.user.id)
    .single();

  const name = profile?.display_name || session.user.email.split('@')[0];
  document.getElementById('avatar-circle').textContent = name[0].toUpperCase();
  document.getElementById('display-name').outerHTML =
    `<p id="display-name" class="font-semibold text-base" style="color:#1A1208;">${esc(name)}</p>`;
  document.getElementById('user-email').outerHTML =
    `<p id="user-email" class="text-sm truncate" style="color:#8B7A5A;">${esc(session.user.email)}</p>`;
  document.getElementById('input-name').value = profile?.display_name || '';

  if (profile?.role === 'admin') {
    document.querySelector('.flex.items-center.gap-4').insertAdjacentHTML('beforeend',
      `<a href="admin.html" class="w-9 h-9 rounded-xl border border-border flex items-center justify-center text-muted hover:text-teal hover:border-teal transition-colors no-underline" title="Admin">
         <span class="ms" style="font-size:18px;">admin_panel_settings</span>
       </a>`);
  }
}

function toggleEditProfile() {
  editOpen = !editOpen;
  document.getElementById('edit-form').classList.toggle('hidden', !editOpen);
}

async function saveProfile() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) return;
  const { error } = await _supabase
    .from('profiles')
    .upsert({ id: session.user.id, display_name: name });
  if (!error) {
    document.getElementById('display-name').textContent = name;
    document.getElementById('avatar-circle').textContent = name[0].toUpperCase();
    toggleEditProfile();
    showToast('Profil mis à jour ✓', 'success');
  }
}

// ── Achats ──
async function loadAchats() {
  const { data, error } = await _supabase
    .from('purchases')
    .select('id, created_at, resource_id, resources(id, slug, title, cover_url, file_url, price)')
    .eq('user_id', session.user.id)
    .order('created_at', { ascending: false });

  document.getElementById('achats-skeleton').classList.add('hidden');
  const list = document.getElementById('achats-list');
  list.classList.remove('hidden');

  const items = (!error && data) ? data : [];
  document.getElementById('achats-count').textContent = items.length > 0 ? `(${items.length})` : '';

  if (items.length === 0) {
    list.innerHTML = `
      <div class="text-center py-14">
        <span class="ms block mb-3" style="font-size:40px;color:#E2D4BC;">shopping_bag</span>
        <p class="font-semibold text-sm mb-1" style="color:#1A1208;">Aucun achat pour l'instant</p>
        <p class="text-xs mb-5" style="color:#8B7A5A;">Vos ressources PDF achetées apparaîtront ici.</p>
        <a href="ressources.html" class="btn-teal" style="font-size:13px;padding:9px 20px;border-radius:16px;">
          <span class="ms" style="font-size:16px;">store</span> Voir la boutique
        </a>
      </div>`;
    return;
  }

  list.innerHTML = items.map(p => renderAchat(p)).join('');
}

function renderAchat(purchase) {
  const r = purchase.resources;
  if (!r) return '';
  const cover = r.cover_url
    ? `<img src="${esc(r.cover_url)}" alt="" class="w-full h-full object-cover" loading="lazy">`
    : `<div class="w-full h-full flex items-center justify-center">
         <span class="ms" style="font-size:22px;color:#5B9EAD;opacity:0.4;">description</span>
       </div>`;
  const fileUrl = esc(r.file_url || '');
  const title   = esc(r.title || 'Ressource');
  const price   = r.price ? `<span class="text-xs px-2 py-0.5 rounded-full" style="background:#F5EDE0;color:#8B6230;">${r.price} €</span>` : '';

  return `
    <div class="achat-card">
      <div class="achat-cover">${cover}</div>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-sm leading-snug mb-0.5" style="color:#1A1208;">${title}</p>
        <p class="text-xs mb-2" style="color:#8B7A5A;">${fmtDate(purchase.created_at)}</p>
        ${price}
      </div>
      <button onclick="downloadResource('${fileUrl}', '${title}', this)"
              class="flex-shrink-0 w-9 h-9 rounded-xl border border-border flex items-center justify-center text-muted hover:text-teal hover:border-teal transition-colors"
              aria-label="Télécharger">
        <span class="ms" style="font-size:20px;">download</span>
      </button>
    </div>`;
}

async function downloadResource(fileUrl, title, btn) {
  if (!fileUrl) { showToast('Fichier introuvable', 'error'); return; }
  btn.disabled = true;
  btn.querySelector('.ms').textContent = 'hourglass_empty';

  const { data: signed, error } = await _supabase.storage
    .from('resources')
    .createSignedUrl(fileUrl, 3600);

  btn.disabled = false;
  btn.querySelector('.ms').textContent = 'download';

  if (error || !signed?.signedUrl) {
    showToast('Impossible de générer le lien. Réessayez.', 'error');
    return;
  }
  const a = document.createElement('a');
  a.href = signed.signedUrl;
  a.download = (title || 'ressource') + '.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function logout() {
  await _supabase.auth.signOut();
  window.location.href = 'index.html';
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
init();
</script>

</body>
</html>
